version: '3.8'

services:
  component3:
    build: .
    container_name: component3
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
      - ./results:/app/results
      - ./cache:/app/cache
      - ./config:/app/config
    environment:
      - PYTHONPATH=/app
      - TZ=Asia/Colombo
    restart: unless-stopped
    command: python api/fastapi_app.py

  # Optional: Redis for caching
  redis:
    image: redis:alpine
    container_name: component3-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data: